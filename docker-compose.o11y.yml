version: '3.8'

# Enterprise Observability Stack (Antigravity V29.4)
# Use: docker-compose -f docker-compose.o11y.yml up -d

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: antigravity_prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - antigravity_o11y_net

  grafana:
    image: grafana/grafana:latest
    container_name: antigravity_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=antigravity
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
    networks:
      - antigravity_o11y_net

networks:
  antigravity_o11y_net:
    driver: bridge
